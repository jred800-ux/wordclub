spring:
  application:
    name: wordclub

  datasource:
    url: jdbc:mysql://localhost:3306/wordclub?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:2407633568@qq.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

server:
  port: 8080

############## Sa-Token 配置 ##############
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: 259200
  is-concurrent: true
  max-login-count: 3
  is-log: true
  # JWT 密钥（32位+，生产环境请通过环境变量 JWT_SECRET 设置）
  jwt-secret-key: ${JWT_SECRET:wordclub_jwt_secret_key_2024_secure}
